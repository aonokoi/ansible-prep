<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f0f0;
        }

        .circle {
            width: 250px;
            height: 250px;
            background: red;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle span {
            color: white;
            font-size: 32px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="circle">
        <span>Welcome</span>
    </div>
</body>
</html>
